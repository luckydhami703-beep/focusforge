<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusForge</title>
  <link rel="stylesheet" href="style1.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>⚡ FocusForge</h1>
      <p>Stay focused. Stay consistent.</p>

      <div class="sidebar-card">
        <h3>Level</h3>
        <p id="level">1</p>
        <span id="xpText">XP: 0 / 100</span>
        <div class="bar"><div id="xpFill"></div></div>
      </div>

      <div class="sidebar-card">
        <h3>Streak</h3>
        <p id="streak">0 🔥</p>
        <span>Build consistency daily</span>
      </div>

      <div class="sidebar-card">
        <h3>Today's Quote</h3>
        <p id="quote">Small progress is still progress.</p>
        <button id="newQuote">Refresh Quote</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>Today's Tasks</h2>
        <button id="themeToggle">🌙</button>
      </div>

      <section class="task-panel">
        <div class="task-input-box">
          <input type="text" id="taskInput" placeholder="Add a new task..." />
          <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList"></ul>
      </section>

      <section class="bottom-cards">
        <div class="info-card">
          <h3>Progress</h3>
          <p><span id="doneCount">0</span> / <span id="totalCount">0</span> tasks completed</p>
          <div class="bar"><div id="progressFill"></div></div>
          <span id="progressPercent">0%</span>
        </div>

        <div class="info-card">
          <h3>Momentum</h3>
          <p id="rewardText">Complete tasks to build your flow.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script1.js"></script>
</body>
</html>
