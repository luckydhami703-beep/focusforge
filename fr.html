<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Productivity OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>⚡ ProdOS</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Tasks</li>
      <li>Notes</li>
      <li>Analytics</li>
    </ul>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1>Dashboard</h1>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
      </div>

      <div class="card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
      </div>

      <div class="card">
        <h3>Streak</h3>
        <p>5 🔥</p>
      </div>
    </div>

    <!-- Task Box -->
    <div class="task-box">
      <h2>Manage Tasks</h2>

      <div class="input-group">
  <input type="text" id="taskInput" placeholder="Enter task..." onkeypress="if(event.key==='Enter') addTask()">
  <button onclick="addTask()">Add</button>
</div>

      <ul id="taskList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
